name: Build APK - Gemini API Chat

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Adicionar plataforma Android
        run: |
          rm -rf android
          npx cap add android

      - name: Injetar MainActivity com Gemini WebView
        run: |
          mkdir -p android/app/src/main/java/com/gemini/google
          cp patches/MainActivity.java \
             android/app/src/main/java/com/gemini/google/MainActivity.java

      - name: Adicionar permissões no AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n</manifest>|' $MANIFEST

      - name: Sincronizar arquivos web
        run: npx cap sync android

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-API-Chat-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
