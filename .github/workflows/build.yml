          ls -la ~/.android/debug.keystore

      - name: Gerar ícones e splash
        run: |
          if [ ! -d "assets" ]; then
            echo "ERRO: pasta assets/ não encontrada na raiz do repositório!"
            echo "Conteúdo da raiz:"
            ls -la
            exit 1
          fi
          echo "Arquivos encontrados em assets/:"
          ls -la assets/
          npx @capacitor/assets generate --android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: gemini-api-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
