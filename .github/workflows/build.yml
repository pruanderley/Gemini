name: Build APK - Gemini API

on:
  workflow_dispatch:        # botão "Run workflow" na aba Actions
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Java 17 (exigido pelo Capacitor 6)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm install

      - name: Criar projeto Android
        run: |
          rm -rf android
          npx cap add android

      - name: Aplicar MainActivity customizada
        run: |
          mkdir -p android/app/src/main/java/com/gemini/google
          cp patches/MainActivity.java android/app/src/main/java/com/gemini/google/MainActivity.java

      - name: Gerar ícones e splash (se a pasta assets existir)
        run: |
          if [ -d "assets" ]; then
            npx @capacitor/assets generate --android
          else
            echo "Pasta assets/ não encontrada — pulando geração de ícones"
          fi

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: gemini-api-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
