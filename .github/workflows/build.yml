name: Build APK - Gemini API

on:
  workflow_dispatch:        # botão "Run workflow" na aba Actions
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Java 17 (exigido pelo Capacitor 6)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm install

      - name: Criar projeto Android
        run: |
          rm -rf android
          npx cap add android

      - name: Aplicar MainActivity customizada
        run: |
          mkdir -p android/app/src/main/java/com/gemini/google
          cp patches/MainActivity.java android/app/src/main/java/com/gemini/google/MainActivity.java

      - name: Numerar a versão (permite atualizar por cima)
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Usar keystore fixo (assinatura igual em todos os builds)
        run: |
          if [ ! -f "keystore/debug.keystore" ]; then
            echo "ERRO: arquivo keystore/debug.keystore não encontrado no repositório!"
            exit 1
          fi
          mkdir -p ~/.android
          cp keystore/debug.keystore ~/.android/debug.keystore

      - name: Gerar ícones e splash
        run: |
          if [ ! -d "assets" ]; then
            echo "ERRO: pasta assets/ não encontrada na raiz do repositório!"
            echo "Conteúdo da raiz:"
            ls -la
            exit 1
          fi
          echo "Arquivos encontrados em assets/:"
          ls -la assets/
          npx @capacitor/assets generate --android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: gemini-api-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
